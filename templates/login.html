{{define "login.html"}}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход — Банки</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="bg-gray-50 font-sans">
<div class="min-h-screen flex items-center justify-center p-4">
    <div class="w-full max-w-md bg-white border border-gray-200 rounded-xl px-8 py-10 shadow-lg">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold text-blue-600 mb-1">Банки</h1>
            <p class="text-sm text-gray-500">Семейный учёт вкладов</p>
        </div>
        {{if and . .Error}}
        <div class="bg-red-50 border border-red-200 text-red-600 px-4 py-3 rounded-md text-sm mb-4">{{.Error}}</div>
        {{end}}
        <form method="POST" action="/login">
            <label for="username">Имя пользователя</label>
            <input type="text" id="username" name="username" required autofocus class="mb-4">
            <label for="password">Пароль</label>
            <input type="password" id="password" name="password" required class="mb-6">
            <button type="submit" class="w-full bg-blue-600 text-white font-semibold py-2.5 px-4 rounded-md hover:bg-blue-700 transition-colors cursor-pointer border-0">Войти</button>
        </form>
    </div>
</div>
</body>
</html>
{{end}}
